services:
  db:
    # pgvector を含む Postgres（vector 拡張つき）。RAG の埋め込みを pgvector で検索するため。
    # pg16 系=既存 pg17 ボリュームとは非互換のため、切替時は volume 作り直し＋db:push/seed が必要。
    image: pgvector/pgvector:pg16
    container_name: fh-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: functest_hono
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d functest_hono"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
