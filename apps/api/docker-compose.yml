services:
  db:
    image: postgres:17-alpine
    container_name: fh-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: functest_hono
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d functest_hono"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
