# ArgoCD UI を Traefik 経由で argocd.local に公開する。
# argocd-server は TLS 有効(secure)のまま。client→Traefik は HTTP(web entrypoint),
# Traefik→argocd-server は HTTPS。self-signed cert のため backend のみ検証skip。
# アクセス: http://argocd.local:8081  (k3d serverlb: host8081 -> traefik web/80)
---
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: argocd-backend
  namespace: argocd
spec:
  serverName: argocd-server
  insecureSkipVerify: true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-server
  namespace: argocd
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`argocd.local`)
      services:
        - name: argocd-server
          port: 443
          scheme: https
          serversTransport: argocd-backend
