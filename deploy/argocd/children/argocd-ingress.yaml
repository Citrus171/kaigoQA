# ArgoCD UI を argocd.miyaoo.com で HTTPS 公開。
# argocd-server は TLS 有効(secure)のまま。cert-manager で argocd-tls を発行し
# Traefik websecure で終端。Traefik→argocd-server は HTTPS(self-signed 検証skip)。
---
# cert-manager で Let's Encrypt 証明書を発行（IngressRoute は自動発行非対応のため明示）
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-tls
  namespace: argocd
spec:
  secretName: argocd-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - argocd.miyaoo.com
---
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: argocd-backend
  namespace: argocd
spec:
  serverName: argocd-server
  insecureSkipVerify: true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-server
  namespace: argocd
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`argocd.miyaoo.com`)
      services:
        - name: argocd-server
          port: 443
          scheme: https
          serversTransport: argocd-backend
  tls:
    secretName: argocd-tls
