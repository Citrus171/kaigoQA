apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  labels:
    app: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: hybrid-web:dev
          ports:
            - containerPort: 3000
          env:
            - name: API_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: hybrid-config
                  key: API_ORIGIN
            # Next.js standalone は HOSTNAME env に bind する。未指定時は pod名（=pod IP）
            # に bind され、kubectl port-forward が pod 内 localhost:3000 に接続できず
            # "connection refused" になる。0.0.0.0 で全 IF に bind させ port-forward を通す。
            - name: HOSTNAME
              value: "0.0.0.0"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
