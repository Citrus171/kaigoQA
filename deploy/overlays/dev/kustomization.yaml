apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kaigo
resources:
  - ../../base
images:
  - name: hybrid-api:dev
    newName: ghcr.io/citrus171/kaigo-api
    newTag: sha-1bd7b58
  - name: hybrid-web:dev
    newName: ghcr.io/citrus171/kaigo-web
    newTag: sha-1bd7b58
patches:
  - target:
      kind: Deployment
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: IfNotPresent
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: StatefulSet
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
