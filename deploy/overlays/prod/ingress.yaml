# web を kaigo.miyaoo.com で HTTPS 公開。cert-manager HTTP-01 で Let's Encrypt 証明書を自動取得。
# API(8787) は内部通信のまま（web → BFF → API_ORIGIN=http://api:8787）。
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - kaigo.miyaoo.com
      secretName: kaigo-tls
  rules:
    - host: kaigo.miyaoo.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 3000
