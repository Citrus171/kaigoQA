# api / web の image を GHCR へ build & push する。
# push → CI → GHCR(:dev 上書き) → Argo CD Image Updater が digest 変化を検知 → 自動デプロイ。
# tag は固定 dev のみ(digest strategy で追跡。sha tag は git write-back 昇格時に導入)。
name: deploy-images

on:
  push:
    branches: [feat/ai-routing-poc-impl]
    paths:
      - apps/**
      - packages/**
      - "**/Dockerfile"
      - package-lock.json
      - .github/workflows/deploy-images.yml

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [api, web]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ghcr.io/citrus171/kaigo-${{ matrix.app }}:dev
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
