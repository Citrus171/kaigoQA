# api / web の image を GHCR へ build & push する。
# push → CI → GHCR(:dev と :sha-<short> を push) → Argo CD Image Updater が新しい sha- タグを検知し
# kustomization.yaml へ git commit(write-back=git) → 自動デプロイ。
# :sha-<short> = immutable な updater 追跡用、:dev = 人間の参照/ロールバック用。
name: deploy-images

on:
  push:
    branches: [feat/ai-routing-poc-impl]
    paths:
      - apps/**
      - packages/**
      - "**/Dockerfile"
      - package-lock.json
      - .github/workflows/deploy-images.yml

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [api, web]
    steps:
      - uses: actions/checkout@v4

      - name: Compute short sha
        id: vars
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: |
            ghcr.io/citrus171/kaigo-${{ matrix.app }}:dev
            ghcr.io/citrus171/kaigo-${{ matrix.app }}:sha-${{ steps.vars.outputs.short }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
